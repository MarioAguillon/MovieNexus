<div class="favorites-page container">
  <header class="page-header">
    <h1 class="page-title">Mis <span>Favoritos</span></h1>
    <p class="page-subtitle">Tus películas guardadas para ver más tarde</p>
  </header>

  @if (favoriteMovies.length > 0) {
    <div class="movies-grid animate-fade-in">
      @for (movie of favoriteMovies; track movie.id) {
        <app-movie-card [movie]="movie"></app-movie-card>
      }
    </div>
  } @else {
    <app-empty-state
      icon="❤️"
      title="Aún no tienes favoritos"
      message="Explora el catálogo y guarda las películas que más te gusten."
      actionText="Explorar Películas"
      actionLink="/"
    ></app-empty-state>
  }
</div>
